# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

version: 2.1
orbs:
  aws-cli: circleci/aws-cli@3.2.0
  slack: circleci/slack@4.15.0
  codecov: codecov/codecov@5
  node: circleci/node@7.1.0
jobs:
  test:
    docker:
      - image: cimg/node:22.14
    resource_class: large
    environment:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - run:
          name: Check Projen-Synthed files for Uncommitted Changes
          command: npx projen --no-post && git diff --ignore-space-at-eol --exit-code
      - run:
          name: Run Unit Tests
          command: npx projen test:ci --maxWorkers 4
      - store_test_results:
          path: test-reports
      - store_artifacts:
          path: test-reports
      - codecov/upload:
          report_type: test_results
          flags: webhook-transformer-service:unit
          token: CODECOV_AUTH_TOKEN
      - codecov/upload:
          report_type: coverage
          flags: webhook-transformer-service:unit
          token: CODECOV_AUTH_TOKEN
      - run:
          name: Upload Coverage to NewRelic
          command: npx gaia nr coverage
      - slack/notify:
          event: fail
          template: basic_fail_1
          channel: _circleci
  synth:
    docker:
      - image: cimg/node:22.14
    resource_class: medium
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - aws-cli/setup:
          role-arn: arn:aws:iam::202836572542:role/CircleCI-OIDC
      - run:
          name: CDK Synthesis
          command: npx projen synth
      - persist_to_workspace:
          root: .
          paths:
            - cdk.out
      - store_artifacts:
          path: cdk.out
  deploy-dev:
    docker:
      - image: cimg/node:22.14
    resource_class: small
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - aws-cli/setup:
          role-arn: arn:aws:iam::657230704726:role/CircleCI-OIDC
          profile-name: veho-dev
      - attach_workspace:
          at: .
      - run:
          name: Deploy to dev
          command: npx projen deploy-no-synth:dev
          no_output_timeout: 30m
      - slack/notify:
          event: fail
          template: basic_fail_1
          channel: _circleci
  deploy-staging:
    docker:
      - image: cimg/node:22.14
    resource_class: small
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - aws-cli/setup:
          role-arn: arn:aws:iam::048595045497:role/CircleCI-OIDC
          profile-name: veho-staging
      - attach_workspace:
          at: .
      - run:
          name: Deploy to staging
          command: npx projen deploy-no-synth:staging
          no_output_timeout: 30m
      - slack/notify:
          event: fail
          template: basic_fail_1
          channel: _circleci
  diff-prod:
    docker:
      - image: cimg/node:22.14
    resource_class: small
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - aws-cli/setup:
          role-arn: arn:aws:iam::595208618232:role/CircleCI-OIDC
          profile-name: veho-prod
      - attach_workspace:
          at: .
      - run:
          name: CDK Diff prod
          command: npx projen diff-no-synth:prod > >(tee cdk.log)
          no_output_timeout: 10m
      - persist_to_workspace:
          root: .
          paths:
            - cdk.log
      - store_artifacts:
          path: cdk.log
  post-prod-diff-to-pr:
    resource_class: small
    docker:
      - image: cimg/node:22.14
    steps:
      - run:
          name: Install cdk-notifier
          command: |-
            curl -L "https://github.com/karlderkaefer/cdk-notifier/releases/download/v2.14.6/cdk-notifier_$(uname)_amd64.gz" -o cdk-notifier.gz
            gunzip cdk-notifier.gz && chmod +x cdk-notifier && rm -rf cdk-notifier.gz
            sudo mv cdk-notifier /usr/local/bin/cdk-notifier
            cdk-notifier --version
      - attach_workspace:
          at: .
      - run:
          name: Post prod Diff to PR
          command: |-
            export GITHUB_TOKEN="$(npx obtain-github-app-installation-access-token ci $GH_APP_CREDENTIALS_TOKEN)"
            cdk-notifier --template extendedWithResources -t prod -l cdk.log
  deploy-prod:
    docker:
      - image: cimg/node:22.14
    resource_class: small
    steps:
      - checkout:
          method: blobless
      - run:
          name: Setup NPM token
          command: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
      - node/install-pnpm:
          version: "10.18"
      - node/install-packages:
          pkg-manager: pnpm
          with-cache: true
          include-branch-in-cache-key: false
      - aws-cli/setup:
          role-arn: arn:aws:iam::595208618232:role/CircleCI-OIDC
          profile-name: veho-prod
      - attach_workspace:
          at: .
      - run:
          name: Deploy to prod
          command: npx projen deploy-no-synth:prod
          no_output_timeout: 30m
      - slack/notify:
          event: fail
          template: basic_fail_1
          channel: _circleci
workflows:
  build:
    when:
      not:
        or:
          - equal:
              - main
              - << pipeline.git.branch >>
          - equal:
              - dev
              - << pipeline.git.branch >>
    jobs:
      - test:
          context:
            - aws-platform
            - slack
            - codecov
            - new-relic
      - synth:
          context:
            - aws-platform
      - diff-prod:
          requires:
            - synth
          context:
            - aws-platform
      - post-prod-diff-to-pr:
          requires:
            - diff-prod
          context:
            - Github PR
  deploy:
    when:
      or:
        - equal:
            - main
            - << pipeline.git.branch >>
        - equal:
            - dev
            - << pipeline.git.branch >>
    jobs:
      - test:
          context:
            - aws-platform
            - slack
            - codecov
            - new-relic
      - synth:
          context:
            - aws-platform
      - deploy-dev:
          filters:
            branches:
              only:
                - dev
          requires:
            - test
            - synth
          context:
            - aws-platform
      - deploy-staging:
          filters:
            branches:
              only:
                - main
          requires:
            - test
            - synth
          context:
            - aws-platform
      - diff-prod:
          filters:
            branches:
              only:
                - main
          requires:
            - synth
          context:
            - aws-platform
      - slack/on-hold:
          name: Notify Slack - deploy-prod Approval Required
          context:
            - slack
          filters:
            branches:
              only:
                - main
          requires:
            - test
            - synth
            - deploy-staging
            - diff-prod
          channel: _circleci
      - approve-deploy-prod:
          name: Wait for deploy-prod Approval
          type: approval
          filters:
            branches:
              only:
                - main
          requires:
            - test
            - synth
            - deploy-staging
            - diff-prod
      - deploy-prod:
          filters:
            branches:
              only:
                - main
          requires:
            - test
            - synth
            - deploy-staging
            - diff-prod
            - Wait for deploy-prod Approval
          context:
            - aws-platform
